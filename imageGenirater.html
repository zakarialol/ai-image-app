<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./build/style.css">
    <title>image genirater</title>
</head>
<body class="content-center bg-fourthClr">
    <main class="h-screen p-2 mx-1 bg-gray-400 border-t-8 rounded-t-2xl border-t-secondClr">
        <!-- header only style -->
        <header class="flex items-center justify-between gap-2 mb-8">
            <!-- first part -->
            <div class="flex items-center gap-3">
                <div class="w-10 p-1 text-white rounded-md bg-secondClr text-blue">
                    <svg fill="none" stroke="currentColor"viewBox="0 0 32 32" version="1.1" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                    <title> ai image genirate</title>
                    <g transform="translate(4 0)">
                        <path d="M9.5 9.625l-0.906 2.906-0.875-2.906-2.906-0.906 2.906-0.875 0.875-2.938 0.906 2.938 2.906 0.875zM14.563 8.031l-0.438 1.469-0.5-1.469-1.438-0.469 1.438-0.438 0.5-1.438 0.438 1.438 1.438 0.438zM0.281 24l17.906-17.375c0.125-0.156 0.313-0.25 0.531-0.25 0.281-0.031 0.563 0.063 0.781 0.281 0.094 0.063 0.219 0.188 0.406 0.344 0.344 0.313 0.719 0.688 1 1.063 0.125 0.188 0.188 0.344 0.188 0.5 0.031 0.313-0.063 0.594-0.25 0.781l-17.906 17.438c-0.156 0.156-0.344 0.219-0.563 0.25-0.281 0.031-0.563-0.063-0.781-0.281-0.094-0.094-0.219-0.188-0.406-0.375-0.344-0.281-0.719-0.656-0.969-1.063-0.125-0.188-0.188-0.375-0.219-0.531-0.031-0.313 0.063-0.563 0.281-0.781zM14.656 11.375l1.313 1.344 4.156-4.031-1.313-1.375zM5.938 13.156l-0.406 1.438-0.438-1.438-1.438-0.469 1.438-0.438 0.438-1.469 0.406 1.469 1.5 0.438zM20.5 12.063l0.469 1.469 1.438 0.438-1.438 0.469-0.469 1.438-0.469-1.438-1.438-0.469 1.438-0.438z"></path>
                    </svg>
                    </g>
                </div>
                <p class="text-lg font-bold text-white capitalize">ai image generater</p>
            </div>
            <!-- second part -->
            <button data-btn="theme-mode" class="flex items-center w-8 p-1 text-white rounded-full bg-secondClr">
                    <!-- light mode  -->
                   <svg class="hidden" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <g clip-path="url(#a)" stroke="currentColor" stroke-width="1.5" stroke-miterlimit="10">
                    <path d="M5 12H1M23 12h-4M7.05 7.05 4.222 4.222M19.778 19.778 16.95 16.95M7.05 16.95l-2.828 2.828M19.778 4.222 16.95 7.05" stroke-linecap="round"/>
                    <path d="M12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z" fill="" fill-opacity=".16"/>
                    <path d="M12 19v4M12 1v4" stroke-linecap="round"/>
                    </g>
                    <defs>
                    <clipPath id="a">
                    <path fill="#ffffff" d="M0 0h24v24H0z"/>

                    </clipPath>
                    </defs>

                    </svg>
                    <!-- darkmode -->
                     <svg viewBox="0 0 48 48" id="a" xmlns="http://www.w3.org/2000/svg"><defs><style>.b{fill:none;stroke:#000000;stroke-linecap:round;stroke-linejoin:round; stroke-width:3;}</style></defs><path class="b" d="M31.75,6.479c6.7339,3.8881,10.3177,11.5721,8.969,19.23-1.3496,7.6616-7.3484,13.6604-15.01,15.01-7.6579,1.3487-15.3419-2.2351-19.23-8.969"/><path class="b" d="M32.02,6.75c4.1858,7.2511,2.98,16.4095-2.94,22.33-5.9205,5.92-15.0789,7.1258-22.33,2.94"/><path class="b" d="M10,8v4"/><path class="b" d="M8,10h4"/><path class="b" d="M12,18v3"/><path class="b" d="M10.5,19.5h3"/><path class="b" d="M30.5,14v3"/><path class="b" d="M29,15.5h3"/><path class="b" d="M38.5,5.5v3"/><path class="b" d="M37,7h3"/><path class="b" d="M7.5,41h3"/><path class="b" d="M9,39.5v3"/><path class="b" d="M39.5,36h3"/><path class="b" d="M41,34.5l.02,3"/>
                    </svg>
            </button>
        </header>
        <!-- form styling -->
            <div class="relative w-full h-24 mb-4 overflow-hidden rounded-lg">
                <textarea name="" data-inputArea='inputArea' class="w-full h-full p-2 overflow-y-auto text-lg text-white text-xs outline-none resize-none bg-firstClr [&::-webkit-scrollbar]:w-[4px]
                [&::-webkit-scrollbar-thumb]:bg-white/40
                [&::-webkit-scrollbar-thumb]:rounded-full
                [&::-webkit-scrollbar-track]:bg-transparent"></textarea>
                <!-- svg button -->
                 <button class="absolute w-6 text-white rounded-full cursor-pointer bg-secondClr right-1 bottom-1" data-random ='random-quote'>
                     <svg fill="none" stroke="currentColor" stroke-width="6" class="w-full h-full" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
                         <g fill-rule="evenodd">
                             <path d="M24.898 100.907a7.97 7.97 0 0 1 8.035-7.935l80.011.623c4.419.034 8.209 3.635 8.466 8.042l.517 8.868 26.68-42.392a7.776 7.776 0 0 1 10.94-2.349l66.996 44.369a8.03 8.03 0 0 1 2.275 11.113l-43.766 66.506c-2.432 3.695-7.447 4.8-11.197 2.47l-51.928-32.265v26.49c0 4.419-3.583 8-7.993 8H32.498a7.949 7.949 0 0 1-7.959-7.998l.36-83.542zm11.828 6.694l-.189 71.811 74.127.073-.035-29.78-5.954-4.119c-1.809-1.25-2.375-3.81-1.257-5.71L111 127l-.466-19.749-73.808.35zM156.483 79L118 138.79l60.965 38.32 37.612-58.539L156.483 79z"/>
                             <circle cx="138" cy="135" r="8"/>
                             <circle cx="165" cy="130" r="8"/>
                             <circle cx="193" cy="125" r="8"/>
                             <circle cx="50" cy="124" r="8"/>
                             <circle cx="73" cy="145" r="8"/>
                             <circle cx="95" cy="123" r="8"/>
                             <circle cx="51" cy="165" r="8"/>
                             <circle cx="95" cy="165" r="8"/>
                         </g>
                     </svg>
                 </button>
            </div>
        <!-- this part about the error message  -->
         <div>
            <p data-err="error message"></p>
         </div>
        <!-- div for image paramerter and genirate button -->
         <div data-img-stting = "img-settings" class="flex flex-col gap-4">
                <!-- image type  -->
                 <div data-img-type ='image-type'>
                        <div data-imgType="imgType" class="p-2 imgparamiter outline-hover">
                            <p data-title="ModalTitle">select model</p>
                            <button data-btn="modal-svgs" class="absolute w-4 -translate-y-1/2 right-2 top-1/2">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                                        <path d="M18.2929 15.2893C18.6834 14.8988 18.6834 14.2656 18.2929 13.8751L13.4007 8.98766C12.6195 8.20726 11.3537 8.20757 10.5729 8.98835L5.68257 13.8787C5.29205 14.2692 5.29205 14.9024 5.68257 15.2929C6.0731 15.6835 6.70626 15.6835 7.09679 15.2929L11.2824 11.1073C11.673 10.7168 12.3061 10.7168 12.6966 11.1073L16.8787 15.2893C17.2692 15.6798 17.9024 15.6798 18.2929 15.2893Z" fill="#0F0F0F"/>
                                </svg>
                                <svg class="hidden" viewBox="0 0 24 24" fill="none" stroke = "currentColor" stroke-width = "3" xmlns="http://www.w3.org/2000/svg">
                                <path d="M5.70711 9.71069C5.31658 10.1012 5.31658 10.7344 5.70711 11.1249L10.5993 16.0123C11.3805 16.7927 12.6463 16.7924 13.4271 16.0117L18.3174 11.1213C18.708 10.7308 18.708 10.0976 18.3174 9.70708C17.9269 9.31655 17.2937 9.31655 16.9032 9.70708L12.7176 13.8927C12.3271 14.2833 11.6939 14.2832 11.3034 13.8927L7.12132 9.71069C6.7308 9.32016 6.09763 9.32016 5.70711 9.71069Z" fill="#0F0F0F"/>
                                </svg>
                            </button>
                        </div>
                </div>
                <!-- how much images -->
                <div data-img-nbr ='image-nbr'>
                    <div data-imgNbr="imgNbr" class="p-2 imgparamiter outline-hover">
                            <p data-title="count-title">image count</p>
                            <button data-btn="count-svgs" class="absolute w-4 -translate-y-1/2 right-2 top-1/2">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                                        <path d="M18.2929 15.2893C18.6834 14.8988 18.6834 14.2656 18.2929 13.8751L13.4007 8.98766C12.6195 8.20726 11.3537 8.20757 10.5729 8.98835L5.68257 13.8787C5.29205 14.2692 5.29205 14.9024 5.68257 15.2929C6.0731 15.6835 6.70626 15.6835 7.09679 15.2929L11.2824 11.1073C11.673 10.7168 12.3061 10.7168 12.6966 11.1073L16.8787 15.2893C17.2692 15.6798 17.9024 15.6798 18.2929 15.2893Z" fill="#0F0F0F"/>
                                </svg>
                                <svg class="hidden" viewBox="0 0 24 24" fill="none" stroke = "currentColor" stroke-width = "3" xmlns="http://www.w3.org/2000/svg">
                                <path d="M5.70711 9.71069C5.31658 10.1012 5.31658 10.7344 5.70711 11.1249L10.5993 16.0123C11.3805 16.7927 12.6463 16.7924 13.4271 16.0117L18.3174 11.1213C18.708 10.7308 18.708 10.0976 18.3174 9.70708C17.9269 9.31655 17.2937 9.31655 16.9032 9.70708L12.7176 13.8927C12.3271 14.2833 11.6939 14.2832 11.3034 13.8927L7.12132 9.71069C6.7308 9.32016 6.09763 9.32016 5.70711 9.71069Z" fill="#0F0F0F"/>
                                </svg>
                            </button>
                    </div>
                </div>
                <!-- landscape -->
                <div data-landscape ='landscape'>
                    <div data-landScape="landScape" class="p-2 imgparamiter outline-hover">
                        <p data-title='aspectratio-title'>aspect ratio</p>
                            <button data-btn="aspect-svgs" class="absolute w-4 -translate-y-1/2 right-2 top-1/2">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
                                        <path d="M18.2929 15.2893C18.6834 14.8988 18.6834 14.2656 18.2929 13.8751L13.4007 8.98766C12.6195 8.20726 11.3537 8.20757 10.5729 8.98835L5.68257 13.8787C5.29205 14.2692 5.29205 14.9024 5.68257 15.2929C6.0731 15.6835 6.70626 15.6835 7.09679 15.2929L11.2824 11.1073C11.673 10.7168 12.3061 10.7168 12.6966 11.1073L16.8787 15.2893C17.2692 15.6798 17.9024 15.6798 18.2929 15.2893Z" fill="#0F0F0F"/>
                                </svg>
                                <svg class="hidden" viewBox="0 0 24 24" fill="none" stroke = "currentColor" stroke-width = "3" xmlns="http://www.w3.org/2000/svg">
                                <path d="M5.70711 9.71069C5.31658 10.1012 5.31658 10.7344 5.70711 11.1249L10.5993 16.0123C11.3805 16.7927 12.6463 16.7924 13.4271 16.0117L18.3174 11.1213C18.708 10.7308 18.708 10.0976 18.3174 9.70708C17.9269 9.31655 17.2937 9.31655 16.9032 9.70708L12.7176 13.8927C12.3271 14.2833 11.6939 14.2832 11.3034 13.8927L7.12132 9.71069C6.7308 9.32016 6.09763 9.32016 5.70711 9.71069Z" fill="#0F0F0F"/>
                                </svg>
                            </button>
                    </div>
                </div>
                <!-- genirate button -->
                <button class="content-center w-full font-sans font-bold text-center text-white capitalize rounded-md bg-secondClr spac">
                            <!-- svg place -->
                            <p class="p-2" data-Btn="genirateBtn">genirate</p>
                </button>

        </div>
          <!-- image holder -->
          <div data-imgHolder="imgHolder" class="grid grid-cols-[repeat(auto-fit,minmax(180px,1fr))] mt-4 gap-4">
                
          </div>
    </main>
    <script type="module" src="main.js"></script>
</body>
</html>
